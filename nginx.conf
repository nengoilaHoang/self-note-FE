server {
    listen 80;
    server_name localhost;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;     
        # CỰC KỲ QUAN TRỌNG CHO SPA: 
        # Nếu không tìm thấy file trùng khớp, luôn đẩy về index.html để React/Vite Router tự xử lý tiếp
        try_files $uri $uri/ /index.html;
    }
    # Cấu hình cấm cache file HTML chính để luôn nhận code mới khi bạn deploy
    location ~* \.(html)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
    # Cho phép cache mạnh các file build tĩnh (js, css, png...) vì Vite đã tự đổi tên file (hash) mỗi lần build rồi
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}