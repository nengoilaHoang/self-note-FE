name: Deploy to Server
on:
  push:
    branches:
      - master
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn từ GitHub
        uses: actions/checkout@v4
      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Image và đẩy lên Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: nengoilahoang/self-note:latest # Đổi thành tên image
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push # Phải build xong bước 1 thì bước 2 mới được chạy
    steps:
      - name: Checkout mã nguồn để lấy file docker-compose
        uses: actions/checkout@v4
      - name: Copy file docker-compose.yml lên Server VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}         # IP của Server
          username: root                           # User đăng nhập (root)
          password: ${{ secrets.SERVER_SSH_KEY }}       # Khóa Private SSH Key của bạn
          source: "docker-compose.yml"
          target: "/home/ubuntu/self-note/"       # Đưa thẳng vào thư mục dự án trên server
      - name: SSH vào Server và gạt cần khởi chạy Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/self-note
            docker compose pull
            docker compose up -d
            docker image prune -f # Dọn dẹp các image cũ bị thừa cho nhẹ ổ cứng Server